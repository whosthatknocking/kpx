name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Determine release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="$(git describe --tags --exact-match 2>/dev/null || true)"
            if [[ -z "${tag}" ]]; then
              echo "workflow_dispatch must target a tagged commit" >&2
              exit 1
            fi
          fi

          version="$(tr -d '[:space:]' < internal/buildinfo/VERSION.txt)"
          expected_tag="v${version}"

          if [[ "${tag}" != "${expected_tag}" ]]; then
            echo "tag ${tag} does not match internal/buildinfo/VERSION.txt (${expected_tag})" >&2
            exit 1
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Check release metadata
        run: ./scripts/check_release.sh --expect-tag

      - name: Run tests
        run: go test ./...

      - name: Build release archives
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          mkdir -p dist
          platforms=(
            "darwin amd64 tar.gz"
            "darwin arm64 tar.gz"
            "linux amd64 tar.gz"
          )

          for platform in "${platforms[@]}"; do
            read -r goos goarch archive <<<"${platform}"

            binary_dir="dist/kpx_${VERSION}_${goos}_${goarch}"
            mkdir -p "${binary_dir}"

            GOOS="${goos}" GOARCH="${goarch}" \
              go build -trimpath -ldflags="-s -w" -o "${binary_dir}/kpx" .

            tar -C dist -czf "dist/kpx_${VERSION}_${goos}_${goarch}.tar.gz" "kpx_${VERSION}_${goos}_${goarch}"
            rm -rf "${binary_dir}"
          done

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          (
            cd dist
            sha256sum *.tar.gz > checksums.txt
          )

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt
